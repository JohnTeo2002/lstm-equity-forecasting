# Default configuration for the LSTM equity forecasting pipeline.

data:
  tickers: ["AAPL"]
  start: "2015-01-01"
  end: null
  interval: "1d"
  cache_dir: "data/cache"

features:
  price_col: "Close"
  ema_spans: [10, 20, 50]
  rsi_window: 14
  macd: [12, 26, 9]
  bb_window: 20
  vol_window: 20

windowing:
  lookback: 30  # Reduced from 60 to better capture short-term patterns without lag
  horizon: 1
  train_frac: 0.8
  n_cv_splits: 5

model:
  lstm_units: [64, 32]
  dropout: 0.1  # Reduced from 0.2 to prevent over-smoothing
  dense_units: 16
  learning_rate: 0.001
  batch_size: 64  # Increased from 32 for more stable gradient estimates
  epochs: 100
  patience: 20  # Increased from 10 to allow more training before early stop

ensemble:
  enabled: true  # Use ensemble of LSTM + ARIMA for robustness
  use_arima: true
  use_garch: false  # GARCH predicts volatility; not directly comparable to price

baselines:
  arima_order: [5, 1, 0]
  garch_p: 1
  garch_q: 1
  test_size: 60

output:
  artifacts_dir: "artifacts"
